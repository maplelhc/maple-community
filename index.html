        const btn = document.getElementById(action + 'Btn'); if (btn) btn.disabled = true;
        let cost = 0; const p = plantData;
        switch(action) {
            case 'water': p.water = Math.min(100, p.water + 15); cost = 1; break;

            case 'fertilize': p.fertilizer = Math.min(100, p.fertilizer + 10); cost = 2; break;

        }
        if (action !== 'prune' && currentUser.coins < cost) { if (btn) btn.disabled = false; return alert('枫叶币不足'); }
        if (action !== 'prune') currentUser.coins -= cost; else currentUser.coins += 1;

    function recalcHealth(p) {
        let score = 100;
        if (p.water < 20) score -= 40; else if (p.water < 40) score -= 15; else if (p.water > 95) score -= 25;
        if (p.light < 15) score -= 40; else if (p.light < 35) score -= 15; else if (p.light > 95) score -= 20;
        if (p.fertilizer < 10) score -= 45; else if (p.fertilizer < 25) score -= 20; else if (p.fertilizer > 90) score -= 30;
        if (p.age > 10) score += 5; else if (p.age > 5) score += 3;
        return Math.min(100, Math.max(0, Math.round(score)));
    }

        addLog(message,type='info'){ const now = new Date(); const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`; this.state.logs.unshift({time:timeStr,message,type}); if(this.state.logs.length>50) this.state.logs.pop(); const logContent = document.getElementById('defenseLogContent'); if(!logContent) return; logContent.innerHTML = ''; this.state.logs.forEach(log=>{ const entry = document.createElement('div'); entry.className = `defense-log-entry ${log.type}`; entry.innerHTML = `<span class="defense-log-time">[${log.time}]</span> <span>${log.message}</span>`; logContent.appendChild(entry); }); }

        exportLogs(){ this.addLog('导出日志功能（模拟）','info'); }
        startTrafficVisualization(){ const canvas = document.getElementById('defenseTrafficCanvas'); if(!canvas) return; const ctx = canvas.getContext('2d'); const resize=()=>{ canvas.width=canvas.parentElement?canvas.parentElement.clientWidth:800; canvas.height=200; }; resize(); window.addEventListener('resize',resize); for(let i=0;i<100;i++) this.state.trafficData.push({x:i, y:Math.random()*canvas.height, speed:0.5+Math.random()*2, size:1+Math.random()*3, type:Math.random()>0.7?'malicious':'normal'}); const animate=()=>{ ctx.clearRect(0,0,canvas.width,canvas.height); ctx.strokeStyle='rgba(140,180,140,0.2)'; ctx.lineWidth=1; for(let x=0;x<canvas.width;x+=50){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); } for(let y=0;y<canvas.height;y+=50){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); } this.state.trafficData.forEach(p=>{ p.x+=p.speed; if(p.x>canvas.width){ p.x=0; p.y=Math.random()*canvas.height; p.type=Math.random()>0.7?'malicious':'normal'; } ctx.fillStyle = p.type==='malicious'?'rgba(255,80,80,0.7)':'rgba(140,180,140,0.7)'; ctx.shadowBlur=10; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-20,p.y); ctx.strokeStyle = p.type==='malicious'?'rgba(255,80,80,0.3)':'rgba(140,180,140,0.3)'; ctx.lineWidth=0.5; ctx.stroke(); }); ctx.shadowBlur=0; requestAnimationFrame(animate); }; animate(); setInterval(()=>{ if(Math.random()>0.7) this.state.trafficData.push({x:0, y:Math.random()*canvas.height, speed:0.5+Math.random()*2, size:1+Math.random()*3, type:Math.random()>0.8?'malicious':'normal'}); if(this.state.trafficData.length>150) this.state.trafficData=this.state.trafficData.slice(50); },1000); }
    }
    class BaseConverter {
        constructor(){ this.binaryInput=document.getElementById('baseconv-binary'); this.decimalInput=document.getElementById('baseconv-decimal'); this.hexInput=document.getElementById('baseconv-hex'); this.binaryGroup=document.getElementById('baseconv-binary-group'); this.decimalGroup=document.getElementById('baseconv-decimal-group'); this.hexGroup=document.getElementById('baseconv-hex-group'); this.clearBtn=document.getElementById('baseconv-clear'); this.swapBtn=document.getElementById('baseconv-swap'); this.updating=false; this.swapped=false; }
        init(){ if(this.binaryInput) this.binaryInput.addEventListener('input',()=>this.updateFrom('binary')); if(this.decimalInput) this.decimalInput.addEventListener('input',()=>this.updateFrom('decimal')); if(this.hexInput) this.hexInput.addEventListener('input',()=>this.updateFrom('hex')); if(this.clearBtn) this.clearBtn.addEventListener('click',()=>this.clearAll()); if(this.swapBtn) this.swapBtn.addEventListener('click',()=>this.swapLayout()); document.addEventListener('keydown',(e)=>{ if((e.ctrlKey||e.metaKey)&&e.key==='l'){ e.preventDefault(); this.clearAll(); } if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); this.swapLayout(); } }); if(this.decimalInput) this.decimalInput.value='42'; this.updateFrom('decimal'); }
        clearAllErrors(){ if(this.binaryGroup) this.binaryGroup.classList.remove('invalid'); if(this.decimalGroup) this.decimalGroup.classList.remove('invalid'); if(this.hexGroup) this.hexGroup.classList.remove('invalid'); }
        showError(group){ if(group) group.classList.add('invalid'); }
        updateFrom(source){ if(this.updating) return; this.updating=true; this.clearAllErrors(); const bin=this.binaryInput, dec=this.decimalInput, hex=this.hexInput; if(!bin||!dec||!hex){ this.updating=false; return; } let binaryStr=bin.value.trim().replace(/^0b/,''); let decimalStr=dec.value.trim(); let hexStr=hex.value.trim().replace(/^0x/,'').toUpperCase(); if(source==='binary' && binaryStr===''){ dec.value=''; hex.value=''; this.updating=false; return; } if(source==='decimal' && decimalStr===''){ bin.value=''; hex.value=''; this.updating=false; return; } if(source==='hex' && hexStr===''){ bin.value=''; dec.value=''; this.updating=false; return; } try{ let num; if(source==='binary'){ if(!/^[01]+$/.test(binaryStr)){ this.showError(this.binaryGroup); this.updating=false; return; } num=BigInt('0b'+binaryStr); dec.value=num.toString(); hex.value=num.toString(16).toUpperCase(); } else if(source==='decimal'){ if(!/^\d+$/.test(decimalStr)){ this.showError(this.decimalGroup); this.updating=false; return; } num=BigInt(decimalStr); bin.value=num.toString(2); hex.value=num.toString(16).toUpperCase(); } else if(source==='hex'){ if(!/^[0-9A-Fa-f]+$/.test(hexStr)){ this.showError(this.hexGroup); this.updating=false; return; } num=BigInt('0x'+hexStr); bin.value=num.toString(2); dec.value=num.toString(); } } catch(e){ console.error(e); } this.updating=false; }
        clearAll(){ if(this.binaryInput) this.binaryInput.value=''; if(this.decimalInput) this.decimalInput.value=''; if(this.hexInput) this.hexInput.value=''; this.clearAllErrors(); }
        swapLayout(){ const converter=document.querySelector('.baseconverter-card .converter'); if(!converter) return; if(!this.swapped){ converter.insertBefore(this.hexGroup,this.binaryGroup); if(this.swapBtn) this.swapBtn.textContent='恢复'; this.swapped=true; } else{ converter.insertBefore(this.binaryGroup,this.hexGroup); if(this.swapBtn) this.swapBtn.textContent='切换'; this.swapped=false; } }
    }

    function renderLag(){ return `<div class="feature-card"><h3><span>📶</span> 网络延迟检测</h3><div style="text-align:center; padding:30px;"><div id="lag-value" style="font-size:4rem; font-weight:bold; color:#3f5a3f;">-- ms</div><div style="font-size:1.2rem; color:#5f7555; margin:10px 0;">当前网络往返时间</div><div id="lag-status" style="font-size:1.5rem; margin-top:20px;">检测中...</div><div style="margin-top:30px; color:#8f9e85; font-size:1rem;">网络延迟是指从您的设备发送请求到服务器并收到回复所需的时间。<br>如果数值过高或不稳定，可能会影响游戏体验。</div><button id="refresh-port-btn" style="margin-top:20px; padding:10px 20px; background:#fccf7c; border:none; border-radius:40px; font-size:1.2rem; cursor:pointer;">🔄 刷新隧道端口</button><div id="refresh-result" style="margin-top:10px; font-size:1rem; color:#5f7555;"></div></div></div>`; }
    function updateLagDisplay(latency, status='ok'){ const val=document.getElementById('lag-value'), st=document.getElementById('lag-status'); if(!val||!st) return; if(status==='error'){ val.textContent='❌'; st.textContent='连接失败，请检查网络'; val.style.color='#f55'; return; } val.textContent=`${Math.round(latency)} ms`; st.textContent='网络正常'; if(latency<50){ val.style.color='#5fa04b'; st.textContent='网络极佳'; } else if(latency<150){ val.style.color='#ffa500'; st.textContent='网络一般'; } else{ val.style.color='#f55'; st.textContent='网络延迟较高'; } }
    function initGobang(){ gobangBoard=Array(15).fill().map(()=>Array(15).fill(0)); gobangTurn=1; gobangGameOver=false; renderGobangBoard(); if(gobangStatusEl) gobangStatusEl.innerText='轮到你了（黑棋）'; }
    function renderGobangBoard(){ if(!gobangBoardElement) return; gobangBoardElement.innerHTML=''; for(let i=0;i<15;i++){ for(let j=0;j<15;j++){ const cell=document.createElement('div'); cell.className='gobang-cell'; cell.dataset.row=i; cell.dataset.col=j; if(gobangBoard[i][j]===1) cell.classList.add('black'); else if(gobangBoard[i][j]===2) cell.classList.add('white'); cell.addEventListener('click',handleGobangCellClick); gobangBoardElement.appendChild(cell); } } }
    function handleGobangCellClick(e){ if(gobangGameOver) return; if(gobangTurn!==1) return; const row=parseInt(e.currentTarget.dataset.row), col=parseInt(e.currentTarget.dataset.col); if(gobangBoard[row][col]!==0) return; gobangBoard[row][col]=1; renderGobangBoard(); if(checkGobangWin(row,col,1)){ gobangGameOver=true; if(gobangStatusEl) gobangStatusEl.innerText='你赢了！'; return; } gobangTurn=2; if(gobangStatusEl) gobangStatusEl.innerText='AI 思考中...'; setTimeout(()=>aiGobangMove(),100); }
    function aiGobangMove(){ if(gobangGameOver) return; if(gobangTurn!==2) return; let bestScore=-1, bestMove=null; for(let i=0;i<15;i++){ for(let j=0;j<15;j++){ if(gobangBoard[i][j]!==0) continue; let score=evaluateGobangPosition(i,j,2); if(score>bestScore){ bestScore=score; bestMove=[i,j]; } } } if(bestMove){ const [row,col]=bestMove; gobangBoard[row][col]=2; renderGobangBoard(); if(checkGobangWin(row,col,2)){ gobangGameOver=true; if(gobangStatusEl) gobangStatusEl.innerText='AI 赢了！'; return; } gobangTurn=1; if(gobangStatusEl) gobangStatusEl.innerText='轮到你了（黑棋）'; } else { gobangGameOver=true; if(gobangStatusEl) gobangStatusEl.innerText='平局'; } }
    function evaluateGobangPosition(r,c,color){ let totalScore=0; for(let [dx,dy] of directions){ let count=1; for(let step=1;step<5;step++){ let nr=r+dx*step, nc=c+dy*step; if(nr<0||nr>=15||nc<0||nc>=15) break; if(gobangBoard[nr][nc]===color) count++; else if(gobangBoard[nr][nc]===0) break; else break; } for(let step=1;step<5;step++){ let nr=r-dx*step, nc=c-dy*step; if(nr<0||nr>=15||nc<0||nc>=15) break; if(gobangBoard[nr][nc]===color) count++; else if(gobangBoard[nr][nc]===0) break; else break; } if(count>=5) totalScore+=10000; else if(count===4) totalScore+=1000; else if(count===3) totalScore+=100; else if(count===2) totalScore+=10; else if(count===1) totalScore+=1; } return totalScore; }
    function checkGobangWin(r,c,color){ for(let [dx,dy] of directions){ let count=1; for(let step=1;step<5;step++){ let nr=r+dx*step, nc=c+dy*step; if(nr<0||nr>=15||nc<0||nc>=15) break; if(gobangBoard[nr][nc]===color) count++; else break; } for(let step=1;step<5;step++){ let nr=r-dx*step, nc=c-dy*step; if(nr<0||nr>=15||nc<0||nc>=15) break; if(gobangBoard[nr][nc]===color) count++; else break; } if(count>=5) return true; } return false; }
    function renderGobang(){ return `<div class="feature-card"><h3><span>🎮</span> 五子棋人机对战</h3><div style="text-align:center;"><div id="gobang-board" style="display:grid; grid-template-columns:repeat(15,30px); gap:0; background-color:#e0c9a5; border:2px solid #8b5a2b; width:fit-content; margin:0 auto;"></div><div style="margin-top:15px;"><button class="feature-btn" id="restart-gobang">重新开始</button></div><div id="gobang-status" style="margin-top:10px; color:#3f5a3f;">轮到你了（黑棋）</div></div></div>`; }
    function initChess(playerColor='w'){ chessGame=new Chess(); chessGameOver=false; chessPlayerColor=playerColor; renderChessBoard(); chessStatusEl.innerText=chessPlayerColor==='w'?'轮到你了（白棋）':'AI 思考中...'; if(chessPlayerColor==='b') setTimeout(()=>aiChessMove(),100); }
    function renderChessBoard(){ if(!chessBoardElement||!chessGame) return; const board=chessGame.board(); chessBoardElement.innerHTML=''; const letters=['a','b','c','d','e','f','g','h']; for(let row=0;row<8;row++){ for(let col=0;col<8;col++){ const square=letters[col]+(8-row); const piece=board[row][col]; const cell=document.createElement('div'); cell.className='chess-cell'; cell.dataset.square=square; cell.style.backgroundColor=(row+col)%2===0?'#f0d9b5':'#b58863'; if(piece){ const symbol=piece.color==='w'?piece.type.toUpperCase():piece.type.toLowerCase(); cell.textContent=getChessSymbol(symbol); cell.style.fontSize='28px'; cell.style.lineHeight='1'; cell.style.textAlign='center'; cell.style.color=piece.color==='w'?'#fff':'#222'; } cell.addEventListener('click',handleChessCellClick); chessBoardElement.appendChild(cell); } } }
    function getChessSymbol(piece){ const map={'K':'♔','Q':'♕','R':'♖','B':'♗','N':'♘','P':'♙','k':'♚','q':'♛','r':'♜','b':'♝','n':'♞','p':'♟'}; return map[piece]||piece; }
    function handleChessCellClick(e){ if(chessGameOver) return; const square=e.currentTarget.dataset.square; const currentTurn=chessGame.turn(); if(currentTurn!==chessPlayerColor){ chessStatusEl.innerText='现在不是你的回合'; return; } if(!selectedChessSquare){ const piece=chessGame.get(square); if(piece && piece.color===chessPlayerColor){ selectedChessSquare=square; highlightChessSquare(square); } } else { const move={from:selectedChessSquare,to:square}; try{ chessGame.move(move); clearChessHighlights(); renderChessBoard(); selectedChessSquare=null; if(chessGame.in_checkmate()){ chessGameOver=true; chessStatusEl.innerText='你赢了！'; return; } if(chessGame.in_stalemate()||chessGame.in_threefold_repetition()||chessGame.insufficient_material()){ chessGameOver=true; chessStatusEl.innerText='平局'; return; } chessStatusEl.innerText='AI 思考中...'; setTimeout(()=>aiChessMove(),100); } catch(e){ selectedChessSquare=null; clearChessHighlights(); } } }
    function highlightChessSquare(square){ clearChessHighlights(); document.querySelectorAll('.chess-cell').forEach(cell=>{ if(cell.dataset.square===square) cell.style.outline='3px solid #ff0'; }); }

    async function aiChessMove(){ if(chessGameOver) return; const currentTurn=chessGame.turn(); if(currentTurn===chessPlayerColor) return; const fen=chessGame.fen(); try{ const res=await fetch('/api/chess/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fen,difficulty:chessDifficultyLevel})}); const data=await res.json(); if(data.error) throw new Error(data.error); chessGame.move(data.move); renderChessBoard(); if(chessGame.in_checkmate()){ chessGameOver=true; chessStatusEl.innerText='AI 赢了！'; return; } if(chessGame.in_stalemate()||chessGame.in_threefold_repetition()||chessGame.insufficient_material()){ chessGameOver=true; chessStatusEl.innerText='平局'; return; } chessStatusEl.innerText='轮到你了（'+(chessPlayerColor==='w'?'白棋':'黑棋')+'）'; } catch(e){ console.error(e); chessStatusEl.innerText='AI 出错了，请重试'; } }
    function renderChess(){ return `<div class="feature-card"><h3><span>♜</span> 国际象棋人机对战 · 15级难度</h3><div style="text-align:center;"><div id="chess-board" style="display:grid; grid-template-columns:repeat(8,1fr); width:400px; height:400px; margin:0 auto; border:2px solid #8b5a2b;"></div><div style="margin-top:15px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;"><button class="feature-btn" id="restart-chess-white">执白开始</button><button class="feature-btn" id="restart-chess-black">执黑开始</button><select id="chess-difficulty" class="feature-input" style="width:120px;">${Array.from({length:CHESS_DIFFICULTY_LEVELS},(_,i)=>{const l=i+1;return `<option value="${l}" ${l===chessDifficultyLevel?'selected':''}>难度 ${l}</option>`;}).join('')}</select></div><div id="chess-status" style="margin-top:10px; color:#3f5a3f;">初始</div></div></div>`; }

    function attachDonateEvents(){ const donateBtn=document.getElementById('donate-btn'); if(donateBtn) donateBtn.addEventListener('click',async()=>{ if(!currentUser){ alert('请先登录'); return; } const amount=parseInt(document.getElementById('donate-amount').value); const message=document.getElementById('donate-message').value; if(isNaN(amount)||amount<=0){ alert('请输入有效的金额'); return; } const res=await apiFetch('/api/donate',{method:'POST',body:JSON.stringify({username:currentUser.username,amount,message})}); if(res.success){ alert('捐赠成功！感谢你的支持 ❤️'); currentTab='donate'; renderApp(); } else alert(res.error||'捐赠失败'); }); const issueBtn=document.getElementById('issue-cert-btn'); if(issueBtn) issueBtn.addEventListener('click',async()=>{ const username=document.getElementById('cert-username').value.trim(); const certName=document.getElementById('cert-name').value.trim(); if(!username||!certName){ alert('请填写用户名和证书名称'); return; } if(!adminAuthorized){ alert('请先登录管理员'); return; } const res=await issueCertificate(username, certName, currentUser.username); if(res.success){ alert(`证书已发放，编号：${res.cert_number}`); document.getElementById('cert-username').value=''; document.getElementById('cert-name').value=''; } else alert(res.error||'发放失败'); }); const adminViewBtn=document.getElementById('admin-view-donations'); if(adminViewBtn) adminViewBtn.addEventListener('click',async()=>{ if(!adminAuthorized) return; const donations=await getDonations(); if(Array.isArray(donations)) alert(donations.map(d=>`${d.username} 捐赠 ${d.amount} 于 ${new Date(d.donated_at).toLocaleString()}`).join('\n')||'暂无捐赠记录'); else alert('获取失败'); }); }

    const lifeTestTypes=[{name:'⛰️ 远山型',percent:8.3,description:'你像远山一样沉稳而坚定。不追逐潮流，不迎合喧嚣，只是静静地站在那里，成为别人可以依靠的方向。你的力量来自内心深处的定力。',fuel1:'稳固根基',fuel2:'成为他人的依靠',soulmate:'江河型'},{name:'🌊 江河型',percent:12.7,description:'你像江河一样奔流不息。你知道目的地在哪里，所以从不因路上的石头而停留。你教会别人：顺势而为，比硬碰硬更有力量。',fuel1:'奔流向前',fuel2:'开辟新路',soulmate:'远山型'},{name:'🔥 薪火型',percent:9.4,description:'你像一簇不灭的薪火。也许微弱，但从不熄灭。你在人群中传递温暖和希望，让身边的人相信：再冷的夜，也有光。',fuel1:'传递温度',fuel2:'点燃他人',soulmate:'旷野型'},{name:'🌲 独木型',percent:14.1,description:'你像森林中的一棵独木。不依附、不攀缘，独自生长，独自承受风雨。你享受孤独，也因孤独而强壮。',fuel1:'独立生长',fuel2:'不妥协的自我',soulmate:'藤蔓型'},{name:'🍃 藤蔓型',percent:10.5,description:'你像藤蔓一样柔软而有韧性。你善于连接、善于倾听，总能在人与人之间架起桥梁。你的力量是看不见的，但无处不在。',fuel1:'连接万物',fuel2:'滋养他人',soulmate:'独木型'},{name:'🏜️ 旷野型',percent:7.2,description:'你是旷野，是无垠的可能。你拒绝被定义，厌恶一切框框。你的人生信条是：路不是用来走的，是用来创造的。',fuel1:'创造可能',fuel2:'打破边界',soulmate:'薪火型'},{name:'💎 矿石型',percent:11.8,description:'你像深埋地下的矿石。平时不起眼，但经过打磨就能发出耀眼的光。你相信时间的力量，愿意用岁月把自己炼成珍宝。',fuel1:'自我雕琢',fuel2:'等待时机',soulmate:'江河型'},{name:'🌱 萌芽型',percent:6.0,description:'你是刚刚破土的萌芽。对世界充满好奇，对未来毫无畏惧。你的天真不是幼稚，而是最纯粹的生命力。',fuel1:'拥抱可能',fuel2:'永远好奇',soulmate:'远山型'}];
    const answerMapping=[[0,1,2,3],[4,5,6,7],[1,3,5,0],[2,4,6,7],[3,1,7,5]];
    let lifeTestState={step:'start',answers:[],resultType:null};
    function calculateResult(answers){ const counts=new Array(lifeTestTypes.length).fill(0); for(let i=0;i<answers.length;i++) counts[answerMapping[i][answers[i]]]++; let maxIdx=0; for(let i=1;i<counts.length;i++) if(counts[i]>counts[maxIdx]) maxIdx=i; return lifeTestTypes[maxIdx]; }
    function renderLifeTest(){ if(lifeTestState.step==='start'){ return `<div class="feature-card" style="text-align:center;"><h3><span>🧩</span> 人生原型测试</h3><p style="margin:30px 0; font-size:1.3rem;">用5道题，找到你内在的原型</p><button class="feature-btn" id="lifetest-start">开始测试</button></div>`; } else if(lifeTestState.step==='quiz'){ const questions=[{q:'你最享受哪种独处的方式？',opts:['静静坐着看山看云','沿着河流或海岸线漫步','围炉烤火发呆','靠在树下听风']},{q:'别人通常怎么形容你？',opts:['让人安心','有方向感','很温暖','很独立']},{q:'面对困境时，你更倾向？',opts:['以柔克刚','顺势而为','燃烧自己照亮别人','独自扛过去']},{q:'你觉得自己更像？',opts:['一根藤蔓','一片旷野','一块矿石','一株萌芽']},{q:'你的座右铭接近？',opts:['上善若水','野火烧不尽','我自独行','时间看得见']}]; let html=`<div class="feature-card"><h3><span>🧩</span> 人生原型测试</h3>`; questions.forEach((q,idx)=>{ html+=`<div style="margin-bottom:20px;"><p><strong>${idx+1}. ${q.q}</strong></p>`; q.opts.forEach((opt,optIdx)=>{ const checked=lifeTestState.answers[idx]===optIdx?'checked':''; html+=`<label style="display:block; margin:5px 0;"><input type="radio" name="q${idx}" value="${optIdx}" ${checked}> ${opt}</label>`; }); html+=`</div>`; }); html+=`<div class="feature-btns"><button class="feature-btn" id="lifetest-submit">提交</button><button class="feature-btn secondary" id="lifetest-reset">重来</button></div></div>`; return html; } else if(lifeTestState.step==='result'){ const t=lifeTestState.resultType; return `<div class="feature-card"><h3><span>🧩</span> 你的内在原型是：</h3><div style="text-align:center; margin:20px 0;"><span style="font-size:3rem; font-weight:bold; color:#3f5a3f;">${t.name}</span><div style="font-size:1.2rem; color:#5f7555;">占人口中：${t.percent}%</div></div><p style="font-size:1.2rem; line-height:1.6; background:#e5f0d9; border-radius:30px; padding:20px;">${t.description}</p><div style="display:flex; gap:20px; margin-top:20px;"><div style="flex:1; background:#f0f7ea; border-radius:30px; padding:20px;"><div style="font-weight:600;">内在燃料</div><div style="font-size:1.2rem;">${t.fuel1}</div><div style="font-size:0.9rem; color:#8f9e85;">${t.fuel2}</div></div><div style="flex:1; background:#f0f7ea; border-radius:30px; padding:20px;"><div style="font-weight:600;">灵魂伴侣</div><div style="font-size:1.2rem;">${t.soulmate}</div></div></div><div class="feature-btns" style="margin-top:20px;"><button class="feature-btn" id="lifetest-restart">重新测试</button></div></div>`; } }
    function attachLifeTestEvents(){ if(lifeTestState.step==='start'){ document.getElementById('lifetest-start')?.addEventListener('click',()=>{ lifeTestState.step='quiz'; lifeTestState.answers=[]; renderApp(); }); } else if(lifeTestState.step==='quiz'){ document.getElementById('lifetest-submit')?.addEventListener('click',()=>{ const ans=[]; for(let i=0;i<5;i++){ const radios=document.getElementsByName(`q${i}`); let selected=null; for(let j=0;j<radios.length;j++) if(radios[j].checked){ selected=radios[j].value; break; } if(selected===null){ alert('请先回答所有问题'); return; } ans[i]=parseInt(selected); } lifeTestState.resultType=calculateResult(ans); lifeTestState.step='result'; renderApp(); }); document.getElementById('lifetest-reset')?.addEventListener('click',()=>{ lifeTestState.step='start'; lifeTestState.answers=[]; renderApp(); }); } else if(lifeTestState.step==='result'){ document.getElementById('lifetest-restart')?.addEventListener('click',()=>{ lifeTestState.step='start'; lifeTestState.answers=[]; lifeTestState.resultType=null; renderApp(); }); } }
    function renderBruteforce(){ return `<div class="feature-card"><h3><span>💥</span> 凯撒密码猜测演示</h3><p style="margin-bottom:15px; color:#5f7555;">凯撒密码是一种简单的替换加密，将每个字母向后移动固定位数。密码猜测演示即尝试所有可能的25种移位，总能得到正确的原文。</p><div class="feature-row"><span class="feature-label">密文</span><input type="text" id="bruteforce-cipher" class="feature-input" value="KHOOR" placeholder="输入密文（仅字母）"><button class="feature-btn" id="bruteforce-btn">密码猜测演示</button></div><div id="bruteforce-results" style="margin-top:20px; max-height:400px; overflow-y:auto;"><p style="color:#8f9e85;">点击按钮查看结果</p></div><div class="key-tip" style="margin-top:15px;">💡 提示：现代加密算法（如AES）密钥空间极大（2^128种可能），密码猜测演示在计算上不可行。</div></div>`; }
    function attachBruteforceEvents(){ const btn=document.getElementById('bruteforce-btn'), inp=document.getElementById('bruteforce-cipher'), resDiv=document.getElementById('bruteforce-results'); if(!btn||!inp||!resDiv) return; const bruteForceCaesar=cipher=>{ const result=[]; for(let shift=1;shift<=25;shift++){ let plain=""; for(let ch of cipher){ if(ch>='A'&&ch<='Z'){ let code=ch.charCodeAt(0)-65; code=(code-shift+26)%26; plain+=String.fromCharCode(code+65); } else if(ch>='a'&&ch<='z'){ let code=ch.charCodeAt(0)-97; code=(code-shift+26)%26; plain+=String.fromCharCode(code+97); } else plain+=ch; } result.push({shift,plain}); } return result; }; const displayResults=results=>{ resDiv.innerHTML=`<div style="background:#e5f0d9; border-radius:30px; padding:15px;"><table style="width:100%; border-collapse:collapse;"><tr><th>移位</th><th>可能的明文</th></tr>${results.map(r=>`<tr><td style="padding:5px; border-bottom:1px solid #c0d8b0;">${r.shift}</td><td style="padding:5px; border-bottom:1px solid #c0d8b0;">${escapeHtml(r.plain)}</td></tr>`).join('')}</table><p style="margin-top:10px; color:#5f7555;">✅ 你看到了所有可能的移位，其中只有一个是真正有意义的英文单词。这展示了密码猜测演示的原理。</p></div>`; }; btn.addEventListener('click',()=>{ let cipher=inp.value.trim(); if(!cipher){ resDiv.innerHTML='<p style="color:#f55;">请输入密文</p>'; return; } displayResults(bruteForceCaesar(cipher)); }); }
    async function bankLogin(bankCode, username, password){ const res=await apiFetch('/api/bank/login',{method:'POST',body:JSON.stringify({bank_code:bankCode,username,password})}); if(res.success){ bankStates[bankCode].loggedIn=true; bankStates[bankCode].balance=res.account.balance; await bankLoadTransactions(bankCode); renderApp(); } else alert(res.error||'登录失败'); }
    async function bankRegister(bankCode, username, password){ const res=await apiFetch('/api/bank/register',{method:'POST',body:JSON.stringify({bank_code:bankCode,username,password})}); if(res.success){ alert('注册成功，请登录'); document.getElementById(`bank-${bankCode}-login-form`).style.display='block'; document.getElementById(`bank-${bankCode}-register-form`).style.display='none'; } else alert(res.error||'注册失败'); }
    async function bankDeposit(bankCode){ const amount=parseInt(document.getElementById(`bank-${bankCode}-deposit-amount`).value); if(isNaN(amount)||amount<=0) return alert('请输入有效的金额'); const res=await apiFetch('/api/bank/deposit',{method:'POST',body:JSON.stringify({amount})}); if(res.success){ await bankLoadBalance(bankCode); await bankLoadTransactions(bankCode); await refreshCurrentUser(); renderApp(); document.getElementById(`bank-${bankCode}-deposit-amount`).value=''; } else alert(res.error||'存款失败'); }
    async function bankWithdraw(bankCode){ const amount=parseInt(document.getElementById(`bank-${bankCode}-withdraw-amount`).value); if(isNaN(amount)||amount<=0) return alert('请输入有效的金额'); const res=await apiFetch('/api/bank/withdraw',{method:'POST',body:JSON.stringify({amount})}); if(res.success){ await bankLoadBalance(bankCode); await bankLoadTransactions(bankCode); await refreshCurrentUser(); renderApp(); document.getElementById(`bank-${bankCode}-withdraw-amount`).value=''; } else alert(res.error||'取款失败'); }
    async function bankTransfer(bankCode){ const to=document.getElementById(`bank-${bankCode}-transfer-to`).value.trim(); const amount=parseInt(document.getElementById(`bank-${bankCode}-transfer-amount`).value); if(!to||isNaN(amount)||amount<=0) return alert('请输入有效的收款方和金额'); const res=await apiFetch('/api/bank/transfer',{method:'POST',body:JSON.stringify({to,amount})}); if(res.success){ await bankLoadBalance(bankCode); await bankLoadTransactions(bankCode); document.getElementById(`bank-${bankCode}-transfer-to`).value=''; document.getElementById(`bank-${bankCode}-transfer-amount`).value=''; } else alert(res.error||'转账失败'); }
    async function bankLogout(bankCode){ const res=await apiFetch('/api/bank/logout',{method:'POST'}); if(res.success){ bankStates[bankCode].loggedIn=false; bankStates[bankCode].balance=0; bankStates[bankCode].transactions=[]; renderApp(); } }
    async function bankLoadBalance(bankCode){ const res=await apiFetch('/api/bank/balance'); if(res && typeof res.balance !== 'undefined'){ bankStates[bankCode].balance=res.balance; const span=document.getElementById(`bank-${bankCode}-balance`); if(span) span.innerText=res.balance; } }
    async function bankLoadTransactions(bankCode){ const res=await apiFetch('/api/bank/transactions'); if(Array.isArray(res)){ bankStates[bankCode].transactions=res; const container=document.getElementById(`bank-${bankCode}-transactions`); if(container){ container.innerHTML=res.map(t=>`<div class="bank-transaction-item"><span>${t.type==='deposit'?'存款':t.type==='withdraw'?'取款':t.type==='transfer_out'?'转出':t.type==='transfer_in'?'转入':t.type==='checkin'?'签到利息':t.type==='raffle'?'抽奖':t.type}</span><span> ${t.amount} 枫叶币</span>${t.target_username?` → ${escapeHtml(t.target_username)}`:''}${t.description?` (${t.description})`:''}<span style="float:right;">${new Date(t.created_at).toLocaleString()}</span></div>`).join(''); } } }
    async function bankCheckin(bankCode){ const res=await apiFetch('/api/bank/checkin',{method:'POST'}); if(res.success){ await bankLoadBalance(bankCode); await bankLoadTransactions(bankCode); alert(`签到成功！获得利息 ${res.interest} 枫叶币，当前余额 ${res.balance}`); } else alert(res.error||'签到失败'); }
    async function bankRaffle(bankCode){ const res=await apiFetch('/api/bank/raffle',{method:'POST'}); if(res.success){ await bankLoadBalance(bankCode); await bankLoadTransactions(bankCode); alert(`🎉 抽奖成功！花费 ${res.cost} 枫叶币，获得 ${res.reward} 枫叶币，净赚 ${res.net} 枫叶币！当前余额 ${res.balance}`); } else alert(res.error||'抽奖失败'); }
    function renderBankHall(){ const banks=[{code:'liao', name:'廖博文私人银行', rate:'无利息', features:'基础存取转账', hasCheckin:false, hasRaffle:false, bgm:'liao'},{code:'wang', name:'王的银行', rate:'利率1.5%', features:'每日签到利息', hasCheckin:true, hasRaffle:false, bgm:'wang'},{code:'zhanzhang', name:'站长虚无银行', rate:'利率2.5%', features:'签到+抽奖', hasCheckin:true, hasRaffle:true, bgm:'zhanzhang'}]; let html=`<div class="feature-card"><h3>🏦 银行大厅</h3><p style="margin-bottom:20px">请分别登录各银行账户进行操作</p>`; for(let b of banks){ const state=bankStates[b.code]; if(!state.loggedIn){ html+=`<div class="feature-card" style="margin-top:20px"><h4>${b.name} · ${b.rate}</h4><div id="bank-${b.code}-login-register"><div style="margin-bottom:10px;"><button class="feature-btn secondary" id="bank-${b.code}-show-login">登录</button><button class="feature-btn secondary" id="bank-${b.code}-show-register">注册</button></div><div id="bank-${b.code}-login-form" style="display:block;"><div class="feature-row"><span class="feature-label">用户名</span><input type="text" id="bank-${b.code}-login-username" class="feature-input" placeholder="枫叶社区用户名"></div><div class="feature-row"><span class="feature-label">银行密码</span><input type="password" id="bank-${b.code}-login-password" class="feature-input"></div><div class="feature-btns"><button class="feature-btn" id="bank-${b.code}-login-btn">登录</button></div></div><div id="bank-${b.code}-register-form" style="display:none;"><div class="feature-row"><span class="feature-label">用户名</span><input type="text" id="bank-${b.code}-reg-username" class="feature-input" placeholder="枫叶社区用户名"></div><div class="feature-row"><span class="feature-label">银行密码</span><input type="password" id="bank-${b.code}-reg-password" class="feature-input"></div><div class="feature-row"><span class="feature-label">确认密码</span><input type="password" id="bank-${b.code}-reg-password2" class="feature-input"></div><div class="feature-btns"><button class="feature-btn" id="bank-${b.code}-register-btn">注册</button></div></div><     function buildVirtualKeyboard() { const container = document.getElementById('db-virtual-keyboard'); if (!container) return; container.innerHTML = ''; for (let row of sqlKeyboardLayout) { const rowDiv = document.createElement('div'); rowDiv.style.display = 'flex'; rowDiv.style.gap = '5px'; rowDiv.style.justifyContent = 'center'; rowDiv.style.marginBottom = '5px'; for (let key of row) { const btn = document.createElement('button'); btn.textContent = key; btn.style.padding = '8px 12px'; btn.style.borderRadius = '30px'; btn.style.border = 'none'; btn.style.background = '#fccf7c'; btn.style.cursor = 'pointer'; btn.onclick = () => handleVirtualKey(key); rowDiv.appendChild(btn); } container.appendChild(rowDiv); } }
    function handleVirtualKey(key) { const input = document.getElementById('db-command-input'); if (!input) return; if (key === 'Backspace') { input.value = input.value.slice(0, -1); } else if (key === 'Space') { input.value += ' '; } else if (key === 'Enter') { sendSqlCommand(); } else if (key === 'Tab') { input.value += '\t'; } else if (key === 'Up' || key === 'Down' || key === 'Left' || key === 'Right') { return; } else { input.value += key; } input.focus(); }
    function sendSqlCommand() { const input = document.getElementById('db-command-input'); const cmd = input.value; if (!cmd.trim() || !sqlSocket || !sqlConnected) return; sqlSocket.emit('terminal_input', { data: cmd + '\n' }); input.value = ''; }
    function appendToTerminal(text) {
        const outDiv = document.getElementById('db-terminal-output');
        if (!outDiv) { console.error('appendToTerminal: 找不到 db-terminal-output 元素'); return; }
        outDiv.textContent += text;
        outDiv.scrollTop = outDiv.scrollHeight;

    // 🔧 修复：连接数据库终端时携带 Token
    async function connectDatabaseTerminal() {
        if (!adminAuthorized || !adminToken) { alert('请先登录管理员'); return; }
        if (sqlSocket && sqlConnected) { alert('已连接，请先断开'); return; }
        const userType = document.getElementById('db-user-type').value;
        const secondPass = document.getElementById('db-second-pass').value;
        const dbPassword = document.getElementById('db-password').value;
        if (!secondPass) { alert('请输入二次口令'); return; }
        if (!dbPassword) { alert('请输入数据库密码'); return; }
        if (sqlSocket) { sqlSocket.disconnect(); sqlSocket = null; }
        sqlSocket = io(API_BASE || undefined, { reconnection: true, reconnectionAttempts: 5, reconnectionDelay: 1000, reconnectionDelayMax: 5000 });
        let heartbeatInterval;
        let connectionRequestSent = false;
        sqlSocket.on('terminal_output', (data) => { if (data && typeof data.data === 'string') appendToTerminal(data.data); else console.warn('[前端调试] 数据格式异常:', data); });
        sqlSocket.on('connect', () => {
            console.log('Socket.IO 已连接');
            if (!connectionRequestSent) {
                // 🔑 关键修改：发送 token 进行认证
                sqlSocket.emit('connect_sql_terminal', {
                    token: adminToken,
                    user_type: userType,
                    second_pass: secondPass,
                    db_password: dbPassword
                });
                connectionRequestSent = true;
            }
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            heartbeatInterval = setInterval(() => { if (sqlSocket && sqlConnected) sqlSocket.emit('heartbeat'); }, 30000);
        });
        sqlSocket.on('connect_error', (err) => { console.error('Socket.IO 连接错误:', err); alert('WebSocket 连接失败：' + err.message); });
        sqlSocket.on('error', (err) => { console.error('Socket.IO 错误:', err); alert('连接错误: ' + (err.msg || '未知错误')); disconnectDatabaseTerminal(); });
        sqlSocket.on('disconnect', () => {
            if (sqlConnected) { appendToTerminal('\n[连接已断开]\n'); sqlConnected = false; const connectPanel = document.getElementById('db-terminal-connect-panel'); const terminalArea = document.getElementById('db-terminal-area'); if (connectPanel) connectPanel.style.display = 'block'; if (terminalArea) terminalArea.style.display = 'none'; }
            if (heartbeatInterval) clearInterval(heartbeatInterval); connectionRequestSent = false;
        });
        sqlSocket.on('reconnect', () => { console.log('Socket.IO 重连成功，重新发送连接请求'); sqlSocket.emit('connect_sql_terminal', { token: adminToken, user_type: userType, second_pass: secondPass, db_password: dbPassword }); });
        const connectPanel = document.getElementById('db-terminal-connect-panel'); const terminalArea = document.getElementById('db-terminal-area'); if (connectPanel) connectPanel.style.display = 'none'; if (terminalArea) terminalArea.style.display = 'block';
        const outDiv = document.getElementById('db-terminal-output'); if (outDiv) outDiv.textContent = '';
        sqlConnected = true;
        setTimeout(() => { if (!sqlConnected) { alert('连接超时，请检查密码是否正确'); disconnectDatabaseTerminal(); } }, 5000);
    }
    function disconnectDatabaseTerminal() { if (sqlSocket) { sqlSocket.disconnect(); sqlSocket = null; } sqlConnected = false; const connectPanel = document.getElementById('db-terminal-connect-panel'); const terminalArea = document.getElementById('db-terminal-area'); if (connectPanel) connectPanel.style.display = 'block'; if (terminalArea) terminalArea.style.display = 'none'; const outDiv = document.getElementById('db-terminal-output'); if (outDiv) outDiv.textContent = ''; }

        const waterBtn=document.getElementById('waterBtn'); if(waterBtn) waterBtn.addEventListener('click',()=>gardenAct('water')); const lightBtn=document.getElementById('lightBtn'); if(lightBtn) lightBtn.addEventListener('click',()=>gardenAct('light')); const fertilizeBtn=document.getElementById('fertilizeBtn'); if(fertilizeBtn) fertilizeBtn.addEventListener('click',()=>gardenAct('fertilize')); const pruneBtn=document.getElementById('pruneBtn'); if(pruneBtn) pruneBtn.addEventListener('click',()=>gardenAct('prune')); const sendBtn=document.getElementById('send-btn'); if(sendBtn) sendBtn.addEventListener('click',sendMessage); const messageInput=document.getElementById('message-input'); if(messageInput) messageInput.addEventListener('keypress',e=>{if(e.key==='Enter') sendMessage();}); const tabContent=document.getElementById('tab-content'); if(tabContent){ tabContent.addEventListener('click',(e)=>{ const btn=e.target.closest('.buy-btn'); if(btn && !btn.disabled){ const productId=btn.dataset.productId; if(productId) buyProduct(productId); } }); }

        if(currentTab==='crypto'){ if(toolsAuthorized.crypto){ const modeSelect=document.getElementById('crypto-mode'); if(modeSelect){ modeSelect.addEventListener('change',e=>{ const ivRow=document.getElementById('iv-row'); if(ivRow) ivRow.style.display=e.target.value==='ecb'?'none':'flex'; }); } const cryptoKeyInput=document.getElementById('crypto-key'); const cryptoSaveBtn=document.getElementById('crypto-save'); if(cryptoSaveBtn){ cryptoSaveBtn.addEventListener('click',()=>{ const key=cryptoKeyInput?cryptoKeyInput.value.trim():cryptoKey; const mode=document.getElementById('crypto-mode')?document.getElementById('crypto-mode').value:cryptoMode; const iv=document.getElementById('crypto-iv')?document.getElementById('crypto-iv').value.trim():cryptoIv; const cleanKey=cleanHex(key); if(cleanKey.length!==32) return alert('密钥必须为32位16进制字符'); if(mode==='cbc'){ const cleanIv=cleanHex(iv); if(cleanIv.length!==32) return alert('IV必须为32位16进制字符'); cryptoIv=iv; } cryptoKey=key; cryptoMode=mode; saveCryptoConfig(); alert('配置已保存'); }); } const cryptoEncryptBtn=document.getElementById('crypto-encrypt'); if(cryptoEncryptBtn){ cryptoEncryptBtn.addEventListener('click',()=>{ const input=document.getElementById('crypto-input')?document.getElementById('crypto-input').value:''; const key=document.getElementById('crypto-key')?document.getElementById('crypto-key').value.trim():cryptoKey; const mode=document.getElementById('crypto-mode')?document.getElementById('crypto-mode').value:cryptoMode; const iv=document.getElementById('crypto-iv')?document.getElementById('crypto-iv').value.trim():cryptoIv; cryptoInput=input; const result=sm4Encrypt(input,key,mode,iv); if(result){ cryptoOutput=result; const out=document.getElementById('crypto-output'); if(out) out.textContent=result; } }); } const cryptoClearBtn=document.getElementById('crypto-clear'); if(cryptoClearBtn){ cryptoClearBtn.addEventListener('click',()=>{ const inp=document.getElementById('crypto-input'); if(inp) inp.value=''; const out=document.getElementById('crypto-output'); if(out) out.textContent=''; cryptoInput=''; cryptoOutput=''; }); } const cryptoDecryptBtn=document.getElementById('crypto-decrypt'); if(cryptoDecryptBtn){ cryptoDecryptBtn.addEventListener('click',()=>{ const input=document.getElementById('crypto-decrypt-input')?document.getElementById('crypto-decrypt-input').value:''; const key=document.getElementById('crypto-key')?document.getElementById('crypto-key').value.trim():cryptoKey; const mode=document.getElementById('crypto-mode')?document.getElementById('crypto-mode').value:cryptoMode; const iv=document.getElementById('crypto-iv')?document.getElementById('crypto-iv').value.trim():cryptoIv; const result=sm4Decrypt(input,key,mode,iv); const out=document.getElementById('crypto-decrypt-output'); if(out) out.textContent=result||'解密失败'; }); } } else { const authBtn=document.getElementById('tool-auth-btn'); if(authBtn){ authBtn.addEventListener('click',async()=>{ const pwd=document.getElementById('tool-password')?document.getElementById('tool-password').value:''; const loginRes = await apiFetch('/admin/login', { method: 'POST', body: JSON.stringify({ password: pwd }) }); if (loginRes.success) { adminToken = loginRes.token; adminAuthorized = true; safeLocalStorageSet('admin_token', adminToken); toolsAuthorized.crypto = true; renderApp(); } else { alert('密码错误'); } }); } } } 
        if(currentTab==='morse'){ if(toolsAuthorized.morse){ const input=document.getElementById('morse-input'), output=document.getElementById('morse-output'); if(input && output){ async function translateToEnglish(text){ if(/^[a-zA-Z0-9\s.,!?'-]+$/.test(text)) return text; try{ const res=await apiFetch('/api/baidu_translate',{method:'POST',body:JSON.stringify({text})}); return res.translated||text; } catch(e){ console.error(e); return text; } } (async()=>{ const translated=await translateToEnglish(input.value); output.value=textToMorse(translated); })(); const textToMorseBtn=document.getElementById('text-to-morse'); if(textToMorseBtn){ textToMorseBtn.addEventListener('click',async()=>{ const translated=await translateToEnglish(input.value); output.value=textToMorse(translated); }); } const morseToTextBtn=document.getElementById('morse-to-text'); if(morseToTextBtn){ morseToTextBtn.addEventListener('click',()=>{ input.value=morseToText(output.value); }); } const morsePlayBtn=document.getElementById('morse-play'); if(morsePlayBtn){ morsePlayBtn.addEventListener('click',()=>playMorseSound(output.value)); } const morseClearBtn=document.getElementById('morse-clear'); if(morseClearBtn){ morseClearBtn.addEventListener('click',()=>{ input.value=''; output.value=''; }); } input.addEventListener('input',async()=>{ const translated=await translateToEnglish(input.value); output.value=textToMorse(translated); }); output.addEventListener('input',()=>{ input.value=morseToText(output.value); }); } } else { const authBtn=document.getElementById('tool-auth-btn'); if(authBtn){ authBtn.addEventListener('click',async()=>{ const pwd=document.getElementById('tool-password')?document.getElementById('tool-password').value:''; const loginRes = await apiFetch('/admin/login', { method: 'POST', body: JSON.stringify({ password: pwd }) }); if (loginRes.success) { adminToken = loginRes.token; adminAuthorized = true; safeLocalStorageSet('admin_token', adminToken); toolsAuthorized.morse = true; renderApp(); } else { alert('密码错误'); } }); } } } 
        if(currentTab==='game'){ const tryStartGame=(retries=8)=>{ const gameArea=document.getElementById('game-area'); if(gameArea){ wordGame.init(); wordGame.start(); const submit=document.getElementById('submit-word'); if(submit) submit.onclick=()=>wordGame.checkInput(); const newGame=document.getElementById('new-game'); if(newGame) newGame.onclick=()=>wordGame.start(); const restart=document.getElementById('restart-game'); if(restart) restart.onclick=()=>wordGame.start(); const input=document.getElementById('word-input'); if(input){ input.onkeypress=(e)=>{if(e.key==='Enter') wordGame.checkInput();}; input.focus(); } console.log('消消乐启动成功'); } else if(retries>0){ setTimeout(()=>tryStartGame(retries-1),200); } else console.error('无法找到 game-area 元素，消消乐启动失败'); }; tryStartGame(); } 
        const dmModal=document.getElementById('dm-modal'); if(dmModal){ const closeDm=document.getElementById('close-dm'); if(closeDm) closeDm.addEventListener('click',closeDM); const dmSend=document.getElementById('dm-send'); if(dmSend) dmSend.addEventListener('click',sendDM); const dmInput=document.getElementById('dm-input'); if(dmInput) dmInput.addEventListener('keypress',e=>{if(e.key==='Enter') sendDM();}); renderDMMessages(); } 
        if(currentTab==='lag'){ if(lagInterval) clearInterval(lagInterval); lagInterval=setInterval(async()=>{ const start=performance.now(); try{ const res=await apiFetch('/ping'); if(res && res.pong==='ok') updateLagDisplay(performance.now()-start); else updateLagDisplay(null,'error'); } catch(err){ updateLagDisplay(null,'error'); } },1000); (async()=>{ const start=performance.now(); try{ const res=await apiFetch('/ping'); if(res && res.pong==='ok') updateLagDisplay(performance.now()-start); else updateLagDisplay(null,'error'); } catch(err){ updateLagDisplay(null,'error'); } })(); const refreshBtn=document.getElementById('refresh-port-btn'); const refreshResult=document.getElementById('refresh-result'); if(refreshBtn){ refreshBtn.addEventListener('click',async()=>{ refreshResult.textContent='正在获取最新端口...'; try{ const res=await apiFetch('/get_bore_port'); if(res.port){ const currentUrl=new URL(window.location.href); currentUrl.port=res.port; refreshResult.textContent=`新端口: ${res.port}，正在跳转...`; setTimeout(()=>{ window.location.href=currentUrl.href; },1500); } else refreshResult.textContent='获取端口失败：'+(res.error||'未知错误'); } catch(err){ refreshResult.textContent='请求失败，请稍后重试'; } }); } } else { if(lagInterval){ clearInterval(lagInterval); lagInterval=null; } } 
        if(currentTab==='gobang'){ gobangBoardElement=document.getElementById('gobang-board'); gobangStatusEl=document.getElementById('gobang-status'); initGobang(); document.getElementById('restart-gobang')?.addEventListener('click',initGobang); } 
        if(currentTab==='chess'){ chessBoardElement=document.getElementById('chess-board'); chessStatusEl=document.getElementById('chess-status'); const difficultySelect=document.getElementById('chess-difficulty'); if(difficultySelect) difficultySelect.addEventListener('change',e=>{ chessDifficultyLevel=parseInt(e.target.value); }); document.getElementById('restart-chess-white')?.addEventListener('click',()=>initChess('w')); document.getElementById('restart-chess-black')?.addEventListener('click',()=>initChess('b')); initChess('w'); }

    function bindAdminModalEvents(){ const modal=document.getElementById('admin-modal'); if(!modal) return; modal.addEventListener('click',async(e)=>{ const target=e.target; if(target.matches('#submit-admin-password')||target.matches('#close-admin-modal')) return; if(adminAuthorized){ if(target.matches('#admin-refresh-users')){ await refreshUserList(); return; } if(target.matches('#admin-refresh-products')){ await refreshProductList(); return; } if(target.matches('[data-grant-user]')){ const username=target.dataset.grantUser; const amount=prompt(`向 ${username} 发放多少枫叶币？`,'10'); if(!amount) return; const num=parseInt(amount); if(isNaN(num)||num<=0) return alert('请输入正整数'); const res=await grantCoins(username,num); if(res && res.success){ await refreshCurrentUser(); await loadRank(); await refreshUserList(); } else alert((res&&res.error)||'发放失败'); return; } if(target.matches('[data-deduct-user]')){ const username=target.dataset.deductUser; const amount=prompt(`从 ${username} 扣除多少枫叶币？`,'10'); if(!amount) return; const num=parseInt(amount); if(isNaN(num)||num<=0) return alert('请输入正整数'); const res=await deductCoins(username,num); if(res && res.success){ await refreshCurrentUser(); await loadRank(); await refreshUserList(); } else alert((res&&res.error)||'扣除失败'); return; } if(target.matches('[data-delete-user]')){ const username=target.dataset.deleteUser; if(!confirm(`注销用户 ${username}？`)) return; const res=await deleteUser(username); if(res && res.success){ await loadRank(); if(currentUser && currentUser.username===username){ currentUser=null; clearSavedUser(); showAdminModal=false; renderApp(); } else await refreshUserList(); } else alert((res&&res.error)||'注销失败'); return; } if(target.matches('#add-product-btn')){ const name=document.getElementById('new-product-name')?.value.trim(); const price=parseInt(document.getElementById('new-product-price')?.value); const stock=parseInt(document.getElementById('new-product-stock')?.value); if(!name||isNaN(price)||isNaN(stock)||price<=0||stock<0) return alert('请填写正确信息'); const data=await addProduct(name, price, stock); if(data && data.success){ await loadProducts(); refreshProductList(); } else alert('添加失败'); return; } if(target.matches('[data-delete-product]')){ const productId=target.dataset.deleteProduct; if(!confirm('确定下架该商品？')) return; const res=await deleteProduct(productId); if(res && res.success){ await loadProducts(); refreshProductList(); } else alert((res&&res.error)||'下架失败'); return; } } }); if(adminAuthorized){ setTimeout(()=>{ refreshUserList(); refreshProductList(); },50); } const connectBtn = document.getElementById('db-connect-btn'); if (connectBtn) { connectBtn.onclick = () => { connectDatabaseTerminal(); }; } const sendCmd = document.getElementById('db-send-cmd'); if (sendCmd) sendCmd.onclick = sendSqlCommand; const cmdInput = document.getElementById('db-command-input'); if (cmdInput) cmdInput.onkeypress = (e) => { if (e.key === 'Enter') sendSqlCommand(); }; const disconnectBtn = document.getElementById('db-disconnect-btn'); if (disconnectBtn) disconnectBtn.onclick = disconnectDatabaseTerminal; buildVirtualKeyboard(); const toggleKb = document.getElementById('db-virtual-keyboard-toggle'); const kbDiv = document.getElementById('db-virtual-keyboard'); if (toggleKb && kbDiv) { toggleKb.onclick = () => { sqlVirtualKeyboardVisible = !sqlVirtualKeyboardVisible; kbDiv.style.display = sqlVirtualKeyboardVisible ? 'flex' : 'none'; }; } document.addEventListener('keydown', (e) => { if (e.ctrlKey && e.shiftKey && e.code === 'KeyH') { e.preventDefault(); if (!document.getElementById('admin-modal') || document.getElementById('admin-modal').style.display !== 'flex') return; clearTerminalOutput(); } }); const modalClose = document.getElementById('close-admin-modal'); if (modalClose) { const origClose = modalClose.onclick; modalClose.onclick = () => { disconnectDatabaseTerminal(); if (origClose) origClose(); }; } }
    renderApp();
